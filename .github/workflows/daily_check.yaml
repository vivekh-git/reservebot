name: Daily Reservation Sniper

on:
  workflow_dispatch:      # Triggered via cron-job.org or manually from GitHub Actions UI
    inputs:
      debug:
        description: 'Enable debug mode (logs all requests/responses/WS payloads, waits 2min past release, no booking)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      date:
        description: 'Target date override (YYYY-MM-DD), leave blank for default'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests pyyaml
          playwright install chromium

      - name: Run Sniper
        env:
          MY_USER_1: ${{ secrets.MY_USER_1 }}
          MY_PASS_1: ${{ secrets.MY_PASS_1 }}
          MY_USER_2: ${{ secrets.MY_USER_2 }}
          MY_PASS_2: ${{ secrets.MY_PASS_2 }}
          MY_USER_3: ${{ secrets.MY_USER_3 }}
          MY_PASS_3: ${{ secrets.MY_PASS_3 }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          echo "Workflow started at: $(TZ='America/Los_Angeles' date)"
          TODAY=$(TZ='America/Los_Angeles' date +%Y-%m-%d)
          ARGS=""
          [ "${{ github.event.inputs.debug }}" = "true" ] && ARGS="$ARGS --debug"
          [ -n "${{ github.event.inputs.date }}" ] && ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          # Auto debug mode on 2026-04-21: observe Ably at release time without booking
          [ "$TODAY" = "2026-04-21" ] && ARGS="$ARGS --debug --date 2026-04-21"
          python code/sniper.py $ARGS
          echo "Workflow ended at: $(TZ='America/Los_Angeles' date)"
