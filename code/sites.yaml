sites:
  - name: "Mount Madonna"
    timezone: "America/Los_Angeles"
    credentials:
      - user_env: MY_USER_1
        pass_env: MY_PASS_1
      - user_env: MY_USER_2
        pass_env: MY_PASS_2
      - user_env: MY_USER_3
        pass_env: MY_PASS_3
    steps:
      - action: navigate
        url: "https://reservations.mountmadonna.org/visitors/login"

      - action: wait_for
        selector: 'input[name="visitor[email]"]'

      - action: fill
        selector: 'input[name="visitor[email]"]'
        value: "{user}"

      - action: fill
        selector: 'input[name="visitor[password]"]'
        value: "{password}"

      - action: click
        selector: 'input[type="submit"][value="Log in"]'

      - action: wait_for_load

      - action: assert_url_not
        url: "https://reservations.mountmadonna.org/visitors/login"
        error: "Login failed — check credentials"

      - action: navigate
        url: "https://reservations.mountmadonna.org/reservations/new"

      - action: if_on_url
        url: "https://reservations.mountmadonna.org/visitors/confirm_information"
        then:
          - action: click
            selector: 'input[type="submit"][value="Continue"]'
          - action: wait_for_url
            url: "**/reservations/new"

      - action: parallel
        polls:
          - selector: ".date_option.available"
            match_attribute: "data-date"
            match_value: "{target_date}"
            slot_retries: 3
            card_button_selector: "#card-button"
            on_match: &booking_steps
              - action: wait_for
                selector: ".slot_container"

              - action: click_preferred
                selector: ".slot_container:not(:has(.slot.unavailable))"
                text_selector: ".time"
                strict: true
                preferred: ["3:00", "3:30", "4:00", "4:30", "5:00", "5:30", "2:30", "2:00", "1:30", "1:00", "12:30", "12:00", "11:30", "11:00"]

              - action: wait_for
                selector: 'input[type="submit"][value="Reserve"]'

              - action: click
                selector: 'input[type="submit"][value="Reserve"]'

              - action: wait_for
                selector: "#card-button"

              - action: click
                selector: "#card-button"

              - action: wait_for
                selector: ".price_option.no_contribution"

              - action: click
                selector: ".price_option.no_contribution"

              - action: wait_for
                selector: "#card-button"

              - action: click
                selector: "#card-button"

              - action: wait_for_url
                url: "**/reservations/confirmation**"
                timeout: 15000

              - action: assert_url
                url: "https://reservations.mountmadonna.org/reservations/confirmation"
                success: "BOOKING CONFIRMED!"

          - selector: ".date_option.available"
            match_attribute: "data-date"
            match_value: "{sunday_date}"
            slot_retries: 3
            card_button_selector: "#card-button"
            on_match: *booking_steps

          - selector: ".date_option.available"
            match_attribute: "data-date"
            match_value: "{test_date}"
            test_mode: true
            slot_retries: 3
            card_button_selector: "#card-button"
            on_match:
              - action: wait_for
                selector: ".slot_container"

              - action: click_preferred
                selector: ".slot_container:not(:has(.slot.unavailable))"
                text_selector: ".time"
                strict: true
                preferred: ["3:00", "3:30", "4:00", "4:30", "5:00", "5:30", "2:30", "2:00", "1:30", "1:00", "12:30", "12:00", "11:30", "11:00"]

              - action: wait_for
                selector: 'input[type="submit"][value="Reserve"]'

              - action: click
                selector: 'input[type="submit"][value="Reserve"]'

              - action: wait_for
                selector: "#card-button"

              - action: click
                selector: "#card-button"

              - action: wait_for
                selector: ".price_option.no_contribution"

              - action: click
                selector: ".price_option.no_contribution"

              - action: wait_for
                selector: "#card-button"

              - action: click
                selector: "#card-button"
                confirms_booking: true

              - action: wait_for_url
                url: "**/reservations/confirmation**"
                timeout: 15000

              - action: assert_url
                url: "https://reservations.mountmadonna.org/reservations/confirmation"
                success: "BOOKING CONFIRMED!"
